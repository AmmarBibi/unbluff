name: selftest

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  selftest:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.11', '3.12']
        include:
          - os: ubuntu-latest
            python-version: '3.8'   # verify the documented floor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run hook selftests
        run: python run_selftests.py
